swagger: "2.0"
info:
  title: GoMessage
  description: 转发Json格式的信息，到钉钉、微信、或其它客户端
  version: v1
  contact:
    email: tay3223@qq.com
basePath: /v1
paths:
  /client/:
    get:
      tags:
      - client
    post:
      tags:
      - client
  /client/active/:
    put:
      tags:
      - client
  /client/del/{id}:
    delete:
      tags:
      - client
  /client/info/{id}:
    get:
      tags:
      - client
  /client/ns/{namespace}:
    get:
      tags:
      - client
  /map/:
    get:
      tags:
      - map
      description: 获取所有用户变量
      operationId: MapControllers./v1/web/map
      responses:
        "200":
          description: 响应成功
        "404":
          description: 错误请求
    post:
      tags:
      - map
      description: 创建一组新的用户变量（同一Namespace下的老变量会被删掉，一个Namespace下永远只有一组用户变量）
      operationId: MapControllers./v1/web/map
      parameters:
      - in: body
        name: key_value_list
        description: 存放用户变量的一个list
        schema:
          type: string
        type: string
      responses:
        "200":
          description: ""
          schema:
            type: array
            items:
              $ref: '#/definitions/models.Configmaps'
        "404":
          description: 错误请求
  /map/{namespace}:
    get:
      tags:
      - map
      description: 获取指定namespace下的用户变量
      operationId: MapControllers./v1/web/map
      responses:
        "200":
          description: 响应成功
        "404":
          description: 错误请求
  /metadata/json/:
    get:
      tags:
      - metadata
      description: 劫持到过境数据
      operationId: JsonControllers./v1/web/json
      responses:
        "200":
          description: 响应成功
        "404":
          description: 错误请求
  /namespace/:
    get:
      tags:
      - namespace
      description: 获取所有命名空间
      operationId: NamespaceControllers./v1/web/namespace
      parameters:
      - in: body
        name: request_data
        description: Namespace对象
        required: true
        schema:
          $ref: '#/definitions/models.Namespaces'
      responses:
        "200":
          description: 响应成功
        "404":
          description: 错误请求
    put:
      tags:
      - namespace
      description: 修改一个命名空间
      operationId: NamespaceControllers./v1/web/namespace
      parameters:
      - in: body
        name: request_data
        description: Namespace对象
        required: true
        schema:
          $ref: '#/definitions/models.Namespaces'
      responses:
        "200":
          description: 响应成功
        "404":
          description: 错误请求
    post:
      tags:
      - namespace
      description: 添加一个命名空间
      operationId: NamespaceControllers./v1/web/namespace
      parameters:
      - in: body
        name: request_data
        description: Namespace对象
        required: true
        schema:
          $ref: '#/definitions/models.Namespaces'
      responses:
        "200":
          description: 响应成功
        "404":
          description: 错误请求
    delete:
      tags:
      - namespace
      description: 删除一个命名空间
      operationId: NamespaceControllers./v1/web/namespace
      parameters:
      - in: body
        name: request_data
        description: Namespace对象
        required: true
        schema:
          $ref: '#/definitions/models.Namespaces'
      responses:
        "200":
          description: 响应成功
        "404":
          description: 错误请求
  /template/:
    get:
      tags:
      - template
      description: 获取所有template
      operationId: TemplateControllers./v1/web/template
      responses:
        "200":
          description: 响应成功
        "404":
          description: 错误请求
    post:
      tags:
      - template
      description: 添加用户模板
      operationId: TemplateControllers./v1/web/template
      responses:
        "200":
          description: 响应成功
        "404":
          description: 错误请求
  /template/{namespace}:
    get:
      tags:
      - template
      description: 获取指定编号的模板信息
      operationId: TemplateControllers./v1/web/template
      responses:
        "200":
          description: 响应成功
        "404":
          description: 错误请求
definitions:
  models.Configmaps:
    title: Configmaps
    type: object
    properties:
      id:
        type: integer
        format: int64
      key:
        type: string
      namespace_id:
        type: integer
        format: int64
      value:
        type: string
  models.Namespaces:
    title: Namespaces
    type: object
    properties:
      description:
        type: string
      id:
        type: integer
        format: int64
      name:
        type: string
tags:
- name: namespace
  description: |
    命名空间接口
- name: map
  description: |
    映射关系接口
- name: template
  description: |
    消息模板接口
- name: client
  description: |
    客户端接口
- name: client
  description: |
    单个client客户端操作的控制器
- name: client
  description: |
    激活状态的控制器
- name: metadata
  description: |
    元数据接口
